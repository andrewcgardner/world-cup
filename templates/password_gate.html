<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center bg-gray-950 text-gray-100 antialiased px-4">

  <div class="w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⚽</div>
      <h1 class="text-2xl font-bold text-yellow-400">WC 2026 Pool</h1>
      <p class="text-sm text-gray-400 mt-1">Enter the pool password to continue</p>
    </div>

    <!-- Form -->
    <form id="gate-form" class="space-y-4" autocomplete="off" novalidate>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">
          Password
        </label>
        <input
          id="password"
          type="password"
          name="password"
          required
          autofocus
          placeholder="••••••••"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-3
                 text-gray-100 placeholder-gray-600 text-base
                 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent
                 transition"
        />
      </div>

      <!-- Error message (hidden until needed) -->
      <p id="error-msg" class="hidden text-sm text-red-400 text-center"></p>

      <button
        type="submit"
        id="submit-btn"
        class="w-full rounded-lg bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500
               text-gray-950 font-semibold py-3 text-base
               focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:ring-offset-2 focus:ring-offset-gray-950
               transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Enter
      </button>
    </form>
  </div>

  <script>
    const form      = document.getElementById('gate-form');
    const input     = document.getElementById('password');
    const errorMsg  = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = input.value;
      if (!password) return;

      // Disable UI while the request is in-flight
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';
      errorMsg.classList.add('hidden');

      try {
        const res = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          // Cookie is now set — reload to let the middleware pass the request through
          window.location.reload();
        } else {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = data.detail || 'Incorrect password. Please try again.';
          errorMsg.classList.remove('hidden');
          input.value = '';
          input.focus();
        }
      } catch {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enter';
      }
    });
  </script>

</body>
</html>
